# Build & Release — OverDrive InCode SDK
#
# Runs on the PUBLIC repo (ALL-FOR-ONE-TECH/OverDrive-DB_SDK)
# The repo ROOT is the InCode SDK — there is NO IncodeSDK/ subdirectory.
#
# Pipeline:
#   1. test    — Run ALL SDK tests (gate: release blocked until all pass)
#   2. build   — Build native cdylib (overdrive.dll / .so / .dylib) — static CRT on Windows
#   3. release — Publish binaries + checksums to GitHub Releases

name: Build & Release SDK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

env:
  CARGO_TERM_COLOR: always

# ─────────────────────────────────────────────────────────────
# JOB 1 — TEST GATE
# All SDK tests must pass before any release build starts.
# ─────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test — ${{ matrix.name }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # Rust SDK ─────────────────────────────────────────
          - name: "Rust / ubuntu"
            os: ubuntu-latest
            job: rust

          - name: "Rust / windows"
            os: windows-latest
            job: rust

          - name: "Rust / macos"
            os: macos-latest
            job: rust

          # Node.js SDK ─────────────────────────────────────
          - name: "Node.js 18"
            os: ubuntu-latest
            job: nodejs
            node: '18'

          - name: "Node.js 20"
            os: ubuntu-latest
            job: nodejs
            node: '20'

          # Python SDK ──────────────────────────────────────
          - name: "Python 3.10"
            os: ubuntu-latest
            job: python
            python: '3.10'

          - name: "Python 3.12"
            os: ubuntu-latest
            job: python
            python: '3.12'

          # Java SDK ────────────────────────────────────────
          - name: "Java 17"
            os: ubuntu-latest
            job: java
            java: '17'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────
      - name: Install Rust toolchain
        if: matrix.job == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        if: matrix.job == 'rust'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}

      - name: Rust — cargo check + unit tests
        if: matrix.job == 'rust'
        # cargo test --lib runs unit tests that do NOT require the native DLL
        run: |
          cargo check
          cargo test --lib -- --test-threads=1

      # ── Node.js ───────────────────────────────────────────
      - name: Setup Node.js
        if: matrix.job == 'nodejs'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Node.js — install dependencies
        if: matrix.job == 'nodejs'
        working-directory: nodejs
        run: npm install

      - name: Node.js — syntax check + tests
        if: matrix.job == 'nodejs'
        working-directory: nodejs
        shell: bash
        run: |
          node --check index.js
          if npm run test --if-present 2>/dev/null; then
            echo "Tests passed ✅"
          else
            echo "No test script — syntax check passed ✅"
          fi

      # ── Python ────────────────────────────────────────────
      - name: Setup Python
        if: matrix.job == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Python — install build tools
        if: matrix.job == 'python'
        run: pip install build

      - name: Python — verify package builds
        if: matrix.job == 'python'
        working-directory: python
        run: python -m build --no-isolation 2>/dev/null || python -m build

      # ── Java ──────────────────────────────────────────────
      - name: Setup JDK
        if: matrix.job == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Java — compile
        if: matrix.job == 'java'
        working-directory: java
        run: mvn -B compile -Dmaven.test.skip=true

# ─────────────────────────────────────────────────────────────
# JOB 2 — BUILD NATIVE LIBRARY
# Runs only after ALL test jobs pass.
# ─────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.asset_name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 — static CRT embedded (no vcruntime140 needed)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            built_name: overdrive_db.dll
            asset_name: overdrive-windows-x64.dll
            rustflags: "-C target-feature=+crt-static"

          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            built_name: liboverdrive_db.so
            asset_name: liboverdrive-linux-x64.so
            rustflags: ""

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            built_name: liboverdrive_db.dylib
            asset_name: liboverdrive-macos-arm64.dylib
            rustflags: ""

          # macOS x64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            built_name: liboverdrive_db.dylib
            asset_name: liboverdrive-macos-x64.dylib
            rustflags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('Cargo.lock') }}

      - name: Build release cdylib
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${{ matrix.built_name }}"

          if [ ! -f "$src" ]; then
            echo "❌ Build output not found: $src"
            ls -la "target/${{ matrix.target }}/release/" || true
            exit 1
          fi

          cp "$src" "dist/${{ matrix.asset_name }}"
          echo "✅ Staged: dist/${{ matrix.asset_name }} ($(du -sh dist/${{ matrix.asset_name }} | cut -f1))"

      # Produce a generic overdrive.dll alias on Windows so consumers can use either name
      - name: Produce overdrive.dll alias (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cp "dist/${{ matrix.asset_name }}" "dist/overdrive.dll"
          echo "✅ Also staged: dist/overdrive.dll"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/

# ─────────────────────────────────────────────────────────────
# JOB 3 — CREATE GITHUB RELEASE
# Runs only after ALL builds succeed.
# ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten into dist/
        run: |
          mkdir -p dist
          find artifacts/ -type f | while read f; do
            cp "$f" "dist/$(basename $f)"
          done
          echo "=== dist/ ==="
          ls -lah dist/

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum $(ls *.dll *.so *.dylib 2>/dev/null) > checksums-sha256.txt || true
          cat checksums-sha256.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }} — OverDrive InCode SDK"
          body: |
            ## OverDrive InCode SDK ${{ steps.version.outputs.tag }}

            **Embeddable hybrid SQL+NoSQL database — like SQLite for JSON.**

            > ✅ All SDK tests passed on GitHub Actions before this release.

            ---

            ### 📦 Downloads

            | File | Platform | Notes |
            |---|---|---|
            | `overdrive.dll` | Windows x64 | Generic name — use this with `overdrive-db` crate |
            | `overdrive-windows-x64.dll` | Windows x64 | Static CRT embedded (no vcruntime140 needed) |
            | `liboverdrive-linux-x64.so` | Linux x64 | |
            | `liboverdrive-macos-arm64.dylib` | macOS ARM64 (Apple Silicon) | |
            | `liboverdrive-macos-x64.dylib` | macOS Intel x64 | |

            ---

            ### 🔐 Checksums (SHA-256)
            See `checksums-sha256.txt` below.

            ### 📖 Docs
            - [Quick Start](https://github.com/ALL-FOR-ONE-TECH/OverDrive-DB_SDK/blob/main/docs/quickstart.md)
            - [API Reference](https://github.com/ALL-FOR-ONE-TECH/OverDrive-DB_SDK/blob/main/docs/api-reference.md)
          files: |
            dist/overdrive.dll
            dist/overdrive-windows-x64.dll
            dist/liboverdrive-linux-x64.so
            dist/liboverdrive-macos-arm64.dylib
            dist/liboverdrive-macos-x64.dylib
            dist/checksums-sha256.txt
          token: ${{ secrets.SDK_RELEASE_TOKEN }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
